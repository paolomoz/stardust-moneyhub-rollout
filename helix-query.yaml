        value: attribute(el, "content")
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")
      publishDate:
        select: head > meta[name="publishdate"]
        value: attribute(el, "content")

  products:
    include:
      - /products/**
    exclude:
      - /products/
    target: /products-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, "content")
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")

  use-cases:
    include:
      - /use-cases/**
    exclude:
      - /use-cases/
    target: /use-cases-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, "content")
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")

  glossary:
    include:
      - /glossary/**
    exclude:
      - /glossary/
    target: /glossary-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, "content")
